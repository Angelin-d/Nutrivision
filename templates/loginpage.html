<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriVision | Intelligent Nutrition Analysis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --bg-canvas: #f0f4f2;
            --nv-green: #065f46;
            --nv-accent: #bef264;
            --nv-card: #ffffff;
            --nv-text: #1a2e26;
            --radius-lg: 40px;
            --radius-md: 24px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-canvas);
            color: var(--nv-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Bento Grid Wrapper */
        .bento-wrapper {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 300px);
            gap: 20px;
            max-width: 1100px;
            width: 100%;
        }

        /* Common Tile Styling */
        .bento-tile {
            background: var(--nv-card);
            border-radius: var(--radius-md);
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            position: relative;
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .bento-tile:hover {
            transform: scale(1.01);
        }

        /* Main Login Tile (Span 2x2) */
        .tile-login {
            grid-column: span 2;
            grid-row: span 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* Brand Tile */
        .tile-brand {
            grid-column: span 2;
            background: var(--nv-green);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            border-radius: var(--radius-lg) var(--radius-md) var(--radius-md) var(--radius-lg);
        }

        /* Stat Tile */
        .tile-stat {
            background: var(--nv-accent);
            color: var(--nv-green);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Image/Visual Tile */
        .tile-img {
            background: url('https://images.unsplash.com/photo-1490818387583-1baba5e638af?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        /* Form Styling with Curves */
        .brand-logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--nv-green);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-logo i { color: var(--nv-green); }

        .form-control {
            border-radius: 15px;
            padding: 14px 20px;
            background: #f8faf9;
            border: 2px solid transparent;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: white;
            border-color: var(--nv-green);
            box-shadow: none;
        }

        .btn-nv {
            background: var(--nv-green);
            color: white;
            padding: 14px;
            border-radius: 15px;
            font-weight: 600;
            width: 100%;
            margin-top: 1rem;
            border: none;
        }

        .btn-nv:hover {
            background: #044634;
            color: var(--nv-accent);
        }

        /* Decorative Curves */
        .blob {
            position: absolute;
            width: 150px;
            height: 150px;
            background: var(--nv-accent);
            filter: blur(40px);
            border-radius: 50%;
            top: -50px;
            right: -50px;
            opacity: 0.4;
        }

        /* Responsive Design */
        @media (max-width: 992px) {
            .bento-wrapper {
                grid-template-columns: 1fr 1fr;
                grid-template-rows: auto;
            }
            .tile-login { order: 1; grid-column: span 2; }
            .tile-brand { order: 2; grid-column: span 2; height: 200px; }
            .tile-stat { order: 3; }
            .tile-img { order: 4; }
        }

        @media (max-width: 576px) {
            .bento-wrapper { grid-template-columns: 1fr; }
            .tile-login, .tile-brand, .tile-stat, .tile-img { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="bento-wrapper">
        <div class="bento-tile tile-login">
            <div class="blob"></div>
            <div class="brand-logo">
                <i class="bi bi-eye-fill"></i> NutriVision
            </div>

            <h3 class="fw-bold mb-1">Analyze your vitality.</h3>
            <p class="text-muted mb-4 small">Sign in to track your micronutrient balance.</p>

            <form action="/myapp/login_post/" method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-medium small text-uppercase">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Username" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-medium small text-uppercase">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="rem">
                        <label class="form-check-label small text-muted" for="rem">Stay signed in</label>
                    </div>
                </div>

                <button type="submit" class="btn btn-nv">Explore Your Dashboard</button>
            </form>

            <div class="mt-4 pt-3 border-top text-center">
                <p class="small text-muted">New to NutriVision? <a href="/myapp/user_re/" class="fw-bold text-success text-decoration-none">Join as user</a></p>
            </div>
        </div>

        <div class="bento-tile tile-brand">
            <h2 class="fw-bold display-6">Beyond the<br>Plate.</h2>
            <p class="opacity-75 mb-0">AI-powered deficiency detection through visual and laboratory data analysis.</p>
        </div>

        <div class="bento-tile tile-stat">
            <i class="bi bi-graph-up-arrow fs-2"></i>
            <div>
                <h4 class="fw-bold mb-0">98%</h4>
                <p class="small mb-0 opacity-75">Analysis Accuracy</p>
            </div>
        </div>

        <div class="bento-tile tile-img">
            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
