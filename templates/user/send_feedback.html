{% extends 'user/userhome.html' %}
{% block body %}

<div class="max-w-2xl mx-auto pt-10 pb-20">
    <div class="text-center mb-10">
        <div class="inline-flex items-center px-4 py-2 bg-emerald-100 rounded-full mb-4">
            <i class="fas fa-comment-dots text-emerald-600 mr-2"></i>
            <span class="text-emerald-700 font-bold text-xs uppercase tracking-widest">Feedback Loop</span>
        </div>
        <h2 class="text-3xl font-black text-gray-900">How are we doing?</h2>
        <p class="text-gray-500 mt-2">Your feedback helps us train our AI for better accuracy.</p>
    </div>

    <div class="bg-white rounded-[2.5rem] border border-gray-100 shadow-xl shadow-emerald-500/5 p-8 md:p-12">
        <form method="post" action="/myapp/send_feedback_post/">
            {% csrf_token %}

            <div class="mb-8 text-center">
                <label class="block text-sm font-bold text-gray-700 mb-4 uppercase tracking-wider">Rate your Experience</label>
                <div class="flex items-center justify-center space-x-3" id="star-container">
                    {% for i in "12345" %}
                    <button type="button" onclick="setRating({{ forloop.counter }})" 
                            class="star-btn text-3xl text-gray-200 hover:text-yellow-400 transition-colors focus:outline-none">
                        <i class="fas fa-star"></i>
                    </button>
                    {% endfor %}
                </div>
                <input type="hidden" name="rating" id="rating-input" value="5" required>
                <p id="rating-label" class="text-xs font-bold text-emerald-600 mt-3 uppercase">Excellent!</p>
            </div>

            <div class="mb-8">
                <label class="block text-sm font-bold text-gray-700 mb-2 ml-1 uppercase tracking-wider">Your Comments</label>
                <textarea name="feedback" required rows="5"
                    class="w-full px-5 py-4 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-emerald-500 focus:bg-white focus:outline-none transition-all placeholder:text-gray-400"
                    placeholder="Tell us what you liked or what we can improve..."></textarea>
            </div>

            <div class="flex justify-center">
                <button type="submit" 
                    class="group relative flex items-center space-x-3 bg-gray-900 text-white px-10 py-4 rounded-2xl font-bold text-sm hover:bg-emerald-600 transition-all duration-300 shadow-lg hover:shadow-emerald-200">
                    <span>Submit Feedback</span>
                    <i class="fas fa-paper-plane text-xs group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"></i>
                </button>
            </div>
        </form>
    </div>

    <div class="mt-8 text-center">
        <p class="text-gray-400 text-sm">Need immediate help? <a href="/myapp/chat_ui/" class="text-emerald-500 font-bold hover:underline">Chat with AI</a></p>
    </div>
</div>

<script>
    function setRating(val) {
        const stars = document.querySelectorAll('.star-btn');
        const input = document.getElementById('rating-input');
        const label = document.getElementById('rating-label');
        
        input.value = val;
        
        // Update Star Colors
        stars.forEach((star, index) => {
            if (index < val) {
                star.classList.remove('text-gray-200');
                star.classList.add('text-yellow-400');
            } else {
                star.classList.remove('text-yellow-400');
                star.classList.add('text-gray-200');
            }
        });

        // Update Labels
        const labels = {1: 'Poor', 2: 'Fair', 3: 'Good', 4: 'Very Good', 5: 'Excellent!'};
        label.innerText = labels[val];
    }

    // Initialize with 5 stars
    window.onload = () => setRating(5);
</script>

{% endblock %}
